# Release 工作流
# 手动触发或在 push tag v* 时自动运行
---
name: Release

on:
  push:
    tags:
      - "v*" # v0.1.0, v0.2.0, ...
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本 (e.g. 0.2.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ==========================================
  # Changelog 生成
  # ==========================================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: |
            {
              "template": "#{{CHANGELOG}}## v${{steps.version.outputs.version}}\n\n${{UNCATEGORIZED}}",
              "categories": [
                {"title": "## ✨ 新功能", "labels": ["feat", "enhancement"]},
                {"title": "## 🐛 Bug 修复", "labels": ["fix", "bug"]},
                {"title": "## 📝 文档", "labels": ["docs"]},
                {"title": "## ♻️ 重构", "labels": ["refactor"]},
                {"title": "## 🔧 配置/CI", "labels": ["ci", "chore"]}
              ],
              "label_extractor": [
                {"pattern": "^(feat|fix|docs|refactor|ci|chore)(\\(.+\\))?:.*", "target": "$1"}
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 构建 Go PetCore (跨平台)
  # ==========================================
  goreleaser:
    name: Build PetCore (goreleaser)
    needs: [changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          distribution: goreleaser
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PetCore binaries
        uses: actions/upload-artifact@v4
        with:
          name: petcore-binaries
          path: petcore/dist/*
          retention-days: 1

  # ==========================================
  # 构建前端 + Tauri 打包 (macOS)
  # ==========================================
  tauri-build:
    name: Build Tauri (${{ matrix.target }})
    needs: [changelog, goreleaser]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # Linux 系统依赖
      - if: runner.os == 'Linux'
        name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # 编译 Go PetCore (目标平台)
      - name: Build PetCore for target
        run: |
          cd petcore
          GOOS="${{ matrix.target == 'aarch64-apple-darwin' && 'darwin' || matrix.target == 'x86_64-apple-darwin' && 'darwin' || matrix.target == 'x86_64-pc-windows-msvc' && 'windows' || 'linux' }}"
          GOARCH="${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'amd64' }}"
          SIDECAR="${{ matrix.target == 'aarch64-apple-darwin' && 'petcore-aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin' && 'petcore-x86_64-apple-darwin' || matrix.target == 'x86_64-pc-windows-msvc' && 'petcore-x86_64-pc-windows-msvc.exe' || 'petcore-x86_64-unknown-linux-gnu' }}"
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
            go build -ldflags="-s -w" \
            -o "../src-tauri/binaries/$SIDECAR" \
            ./cmd/petcore/

      # 构建前端
      - name: Install frontend deps
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd frontend
          pnpm build

      # 打包 Tauri
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build --bundles ${{ matrix.bundles }}
        working-directory: src-tauri
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Upload Tauri bundle
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-${{ matrix.target }}
          path: src-tauri/target/release/bundle/**/*
          retention-days: 1

  # ==========================================
  # 创建 GitHub Release
  # ==========================================
  release:
    name: Create GitHub Release
    needs: [changelog, tauri-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.changelog.outputs.version }}"
          body: ${{ needs.changelog.outputs.changelog }}
          files: |
            DesktopPet-aarch64-apple-darwin/**/*
            DesktopPet-x86_64-apple-darwin/**/*
            DesktopPet-x86_64-pc-windows-msvc/**/*
            DesktopPet-x86_64-unknown-linux-gnu/**/*
          draft: true
          prerelease: false
          generate_release_notes: false
