# Desktop Pet — CI 工作流
# 每次 push 和 PR 时运行：lint → test → build 验证
---
name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch: # 手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ==========================================
  # Lint: 三个语言并行检查
  # ==========================================
  lint:
    strategy:
      fail-fast: false
      matrix:
        lang:
          - name: Go
            dir: petcore
            lint-cmd: golangci-lint run ./... --timeout 5m
          - name: Rust
            dir: src-tauri
            lint-cmd: cargo clippy -- -D warnings
          - name: Frontend
            dir: frontend
            lint-cmd: pnpm lint
    name: Lint (${{ matrix.lang.name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.lang.dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: matrix.lang.name == 'Go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Tauri 需要系统库（Rust 编译需要 glib/gtk/webkit）
      - name: Install system deps
        if: matrix.lang.name == 'Rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libglib2.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        if: matrix.lang.name == 'Rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Install cargo-audit
        if: matrix.lang.name == 'Rust'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Setup Node
        if: matrix.lang.name == 'Frontend'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: matrix.lang.name == 'Frontend'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install golangci-lint
        if: matrix.lang.name == 'Go'
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Install frontend deps
        if: matrix.lang.name == 'Frontend'
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: cd ${{ matrix.lang.dir }} && ${{ matrix.lang.lint-cmd }}

      - name: Run cargo-audit
        if: matrix.lang.name == 'Rust'
        run: cargo audit

  # ==========================================
  # Test: 三个语言并行运行
  # ==========================================
  test:
    strategy:
      fail-fast: false
      matrix:
        lang:
          - name: Go
            dir: petcore
            test-cmd: go test -race -shuffle=on -count=1 ./...
          - name: Rust
            dir: src-tauri
            test-cmd: cargo test --all-targets
          - name: Frontend
            dir: frontend
            test-cmd: pnpm test -- --run
    name: Test (${{ matrix.lang.name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.lang.dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: matrix.lang.name == 'Go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Tauri 需要系统库
      - name: Install system deps
        if: matrix.lang.name == 'Rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libglib2.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        if: matrix.lang.name == 'Rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Node
        if: matrix.lang.name == 'Frontend'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: matrix.lang.name == 'Frontend'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache Go modules
        if: matrix.lang.name == 'Go'
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ${{ matrix.lang.dir }}/go.sum
          key: ${{ runner.os }}-go-${{ hashFiles('petcore/go.sum') }}

      - name: Cache Rust
        if: matrix.lang.name == 'Rust'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend deps
        if: matrix.lang.name == 'Frontend'
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: cd ${{ matrix.lang.dir }} && ${{ matrix.lang.test-cmd }}

  # ==========================================
  # Coverage: 覆盖率门禁
  # ==========================================
  coverage:
    name: Coverage
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate Go coverage
        run: |
          cd petcore
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Check coverage threshold
        run: |
          cd petcore
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=60
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

  # ==========================================
  # Build: 验证打包
  # ==========================================
  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # 安装系统依赖（Tauri 需要）
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
        continue-on-error: true  # 非必需包缺失不阻断

      # 编译 Go PetCore
      - name: Build Go PetCore
        run: |
          cd petcore
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" \
            -o ../src-tauri/binaries/petcore-x86_64-unknown-linux-gnu \
            ./cmd/petcore/

      - name: Install frontend deps
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      # 验证可以编译（不进行完整打包，节省 CI 时间）
      - name: Verify Tauri build
        run: |
          cd src-tauri
          cargo build --release
