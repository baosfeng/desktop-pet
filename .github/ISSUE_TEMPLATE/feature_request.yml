name: 💡 功能建议
description: 为项目提出新想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: 感谢你的建议！
  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能解决了什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 清晰描述你期望的实现方式
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你还考虑过哪些方案？
  - type: dropdown
    id: component
    attributes:
      label: 涉及模块
      options:
        - Tauri 壳 (Rust)
        - 前端 (React/PixiJS)
        - PetCore (Go)
        - LLM 适配
        - 记忆系统
        - 插件系统
        - 文档
        - CI/CD
