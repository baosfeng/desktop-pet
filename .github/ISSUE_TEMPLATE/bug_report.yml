name: 🐛 Bug 报告
description: 提交 bug 帮助改进项目
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢你花时间提交这个 bug！
  - type: textarea
    id: description
    attributes:
      label: 描述
      description: 清晰描述 bug 是什么
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现？
      placeholder: |
        1. 打开应用
        2. 点击宠物
        3. 输入 "xxx"
        4. 出现错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请填写以下信息
      value: |
        - OS: [例如 macOS 14.5]
        - 版本: [例如 v0.1.0]
        - Rust 版本:
        - Go 版本:
  - type: dropdown
    id: component
    attributes:
      label: 影响模块
      options:
        - Tauri 壳 (Rust)
        - 前端 (React/PixiJS)
        - PetCore (Go)
        - LLM 适配
        - 记忆系统
        - 插件系统
        - 其他
