# Desktop Pet — 生产环境覆盖配置示例
# ==============================================
# 本文件作为 config.toml 的覆盖层，仅包含生产环境需要覆盖的字段。
# 放置在与 config.toml 相同的目录，文件名为 config.production.toml。
#
# 加载方式：PETCORE_ENV=production 时自动加载
#
# 覆盖规则：TOML 合并，相同字段覆盖，未指定的字段保留基础配置的值。

[llm]
# 生产环境使用真实的 LLM Provider
provider = "openai"
model = "gpt-4o-mini"
api_key_env = "PETCORE_API_KEY"

[update]
auto_check = true
channel = "stable"

[feature_flags]
# 生产环境开启全部稳定功能
"agent.memory_stage" = true
"agent.tool_loop" = true
"plugin.l1_yaml" = true
"plugin.l2_js" = false
"plugin.l3_mcp" = false
