# golangci-lint 配置 (v2)
version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - misspell
    - revive
    - gosec
    - cyclop
    - ineffassign

  settings:
    cyclop:
      max-complexity: 20
      package-average: 10.0
    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
          severity: warning
        - name: indent-error-flow
          severity: warning
        - name: error-return
          severity: error
        - name: error-strings
          severity: error
        - name: receiver-naming
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: error-naming
          severity: error
        - name: empty-block
          severity: warning
        - name: superfluous-else
          severity: warning
        - name: unused-parameter
          severity: warning
        - name: unreachable-code
          severity: error
        - name: redefines-builtin-id
          severity: error
    gosec:
      excludes:
        - G104

formatters:
  enable:
    - gofumpt
    - gci

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/desktop-pet/petcore)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - cyclop
        - unused
    - path: cmd/
      linters:
        - forbidigo
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
