# Cargo Audit 配置
# 抑制已知的 transitive 依赖警告，这些来自 Tauri v2 框架且不可直接修复
[advisories]
# ==========================================
# GTK3 绑定 — Tauri v2 Linux 后端的 transitive deps
# Tauri 团队正在迁移到 GTK4，当前 v2 版本依赖 GTK3
# 参考：https://github.com/tauri-apps/tauri/issues/10028
# ==========================================
ignore = [
  "RUSTSEC-2024-0413",  # atk: GTK3 unmaintained
  "RUSTSEC-2024-0416",  # atk-sys: GTK3 unmaintained
  "RUSTSEC-2024-0412",  # gdk: GTK3 unmaintained
  "RUSTSEC-2024-0418",  # gdk-sys: GTK3 unmaintained
  "RUSTSEC-2024-0411",  # gdkwayland-sys: GTK3 unmaintained
  "RUSTSEC-2024-0417",  # gdkx11: GTK3 unmaintained
  "RUSTSEC-2024-0414",  # gdkx11-sys: GTK3 unmaintained
  "RUSTSEC-2024-0415",  # gtk: GTK3 unmaintained
  "RUSTSEC-2024-0420",  # gtk-sys: GTK3 unmaintained
  "RUSTSEC-2024-0419",  # gtk3-macros: GTK3 unmaintained
  "RUSTSEC-2024-0429",  # glib: unsound Iterator impl (transitive via Tauri)

  # ==========================================
  # proc-macro-error — 被多个 proc macro crate 广泛使用的 transitive dep
  # 上游已不再维护，但功能稳定且无安全漏洞
  # 替代品 proc-macro-error2 尚未被生态系统广泛采用
  # ==========================================
  "RUSTSEC-2024-0370",  # proc-macro-error: unmaintained

  # ==========================================
  # unic-* — Tauri 的 transitive deps（通过 cocoa/objc 等）
  # 不再活跃维护但功能稳定且无安全漏洞
  # ==========================================
  "RUSTSEC-2025-0081",  # unic-char-property: unmaintained
  "RUSTSEC-2025-0075",  # unic-char-range: unmaintained
  "RUSTSEC-2025-0080",  # unic-common: unmaintained
  "RUSTSEC-2025-0100",  # unic-ucd-ident: unmaintained
  "RUSTSEC-2025-0098",  # unic-ucd-version: unmaintained
]
