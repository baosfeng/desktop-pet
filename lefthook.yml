# lefthook 配置 — Git hooks 管理
# 文档：https://github.com/evilmartians/lefthook
# 安装：brew install lefthook
# 激活：lefthook install

# 跳过钩子：git commit --no-verify 或 SKIP=golangci-lint git commit

pre-commit:
  parallel: true
  commands:
    # ----- Go -----
    golangci-lint:
      root: "petcore/"
      glob: "*.go"
      run: golangci-lint run --timeout 3m {staged_files}
      stage_fixed: true

    go-vet:
      root: "petcore/"
      glob: "*.go"
      run: go vet ./...
      stage_fixed: false

    # ----- Rust -----
    rust-fmt:
      root: "src-tauri/"
      glob: "*.rs"
      run: cargo fmt --check
      stage_fixed: false

    clippy:
      root: "src-tauri/"
      glob: "*.rs"
      run: cargo clippy -- -D warnings
      stage_fixed: false

    # ----- TypeScript -----
    eslint:
      root: "frontend/"
      glob: "*.{ts,tsx}"
      run: pnpm lint
      stage_fixed: false

    prettier:
      root: "frontend/"
      glob: "*.{ts,tsx,json,css,md}"
      run: pnpm format:check
      stage_fixed: false

    # ----- 前端 lockfile 一致性 -----
    pnpm-lockfile-check:
      root: "frontend/"
      glob: "package.json"
      run: |-
        if ! echo "{staged_files}" | grep -q 'pnpm-lock.yaml'; then
          echo "❌ package.json 已修改但 pnpm-lock.yaml 未更新！"
          echo "   请在 frontend/ 下运行: pnpm install"
          echo "   然后重新 git add pnpm-lock.yaml"
          exit 1
        fi
      description: "检查 pnpm-lock.yaml 与 package.json 是否同步"

    # ----- 通用 -----
    check-merge-conflict:
      glob: "*"
      run: |-
        test "$(grep -cE '^<<<<<<< |^=======$|^>>>>>>> ' {staged_files})" -eq 0
      description: "检查未解决的合并冲突"

    secret-scan:
      glob: "*"
      run: |-
        grep -nPE '(?:sk-[a-zA-Z0-9]{20,}|gh[pso]_[a-zA-Z0-9]{36,}|github_pat_[a-zA-Z0-9_]{22,}|glpat-[a-zA-Z0-9_-]{20,}|xox[baprs]-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|export\s+\w+=\s*\x27?[A-Za-z0-9_\-]{20,}|api[-_]?key[" :=]+\x27?[a-zA-Z0-9]{16,})' {staged_files} && exit 1 || true
      description: "扫描密钥泄露（API Key / GitHub PAT / AWS / Slack / GitLab）"

commit-msg:
  commands:
    commit-lint:
      run: |-
        echo "检查提交信息格式（中文描述，首字非小写字母）："
        head -1 "{1}" | grep -P '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .+' || true
      description: "检查 conventional commit 格式"

# post-commit 钩子：提交后自动运行相关测试
post-commit:
  commands:
    go-test-changed:
      root: "petcore/"
      glob: "*.go"
      run: go test ./...
      fail_text: "⚠️  Go 测试失败，请修复！"

# pre-push 钩子：推送前运行完整 lint（与 CI 完全一致）
# 确保本地 lint 通过 = CI lint 通过，避免浪费 CI 分钟
pre-push:
  parallel: false
  commands:
    ci-lint-simulate:
      run: make pre-push
      description: "模拟 CI lint 检查（golangci-lint + cargo clippy + pnpm lint）"
      fail_text: |-
        ❌ pre-push 检查未通过！
          本地 lint 失败意味着 CI 也会失败。
          请修复错误后重新 git push。
          如需跳过（不推荐）：git push --no-verify
